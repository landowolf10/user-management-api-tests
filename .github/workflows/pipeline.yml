name: E2E Tests + Report

on:
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Start API
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
          sleep 5

      - name: Wait for API
        run: |
          until curl -s http://localhost:3000/${{ matrix.env }}/users > /dev/null; do
            sleep 2
          done

      - name: Run tests
        run: npx playwright test --grep @${{ matrix.env }}
        env:
          BASE_URL: http://localhost:3000

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.env }}
          path: playwright-report/

  deploy-report:
    needs: e2e
    runs-on: ubuntu-latest

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Merge reports
        run: |
          mkdir public
          cp -r reports/report-dev/* public/
          cp -r reports/report-prod/* public/prod || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4