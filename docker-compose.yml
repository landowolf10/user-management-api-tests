services:
  api:
    image: ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
    ports:
      - "3000:3000"

  tests:
    image: landowolf/users-api-tests:latest
    depends_on:
      - api
    environment:
      - BASE_URL=http://api:3000
    volumes:
      - ./playwright-report:/app/playwright-report
    command: >
      sh -c "
        until curl -s http://api:3000/dev/users > /dev/null; do
          echo 'Waiting for API...';
          sleep 2;
        done;
        npx playwright test
      "

  report:
    image: nginx:alpine
    depends_on:
      - tests
    ports:
      - "8080:80"
    volumes:
      - ./playwright-report:/usr/share/nginx/html